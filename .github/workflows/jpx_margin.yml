name: JPX信用取引週末残高 取得

on:
  schedule:
    # 毎週火曜 18:00 JST = 09:00 UTC（公表は16:30目安なので余裕を見て設定）
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      target_date:
        description: "対象申込日 YYYYMMDD（空欄なら直近金曜を自動計算）"
        required: false
        default: ""

jobs:
  fetch-margin-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch JPX margin data and update spreadsheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TARGET_DATE_OVERRIDE: ${{ github.event.inputs.target_date }}
        run: python scripts/fetch_jpx_margin.py
